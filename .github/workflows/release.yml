name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish hadrone-core
        working-directory: crates/hadrone-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish
      - name: Publish hadrone-extras
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: crates/hadrone-extras
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cargo publish || echo "hadrone-extras publish failed or already published"
      - name: Publish hadrone-dioxus
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: crates/hadrone-dioxus
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cargo publish || echo "hadrone-dioxus publish failed or already published"
      - name: Publish hadrone-wasm
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: crates/hadrone-wasm
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cargo publish || echo "hadrone-wasm publish failed or already published"
      - name: Publish hadrone-leptos
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: crates/hadrone-leptos
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cargo publish || echo "hadrone-leptos publish failed or already published"
      - name: Publish hadrone-yew
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: crates/hadrone-yew
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cargo publish || echo "hadrone-yew publish failed or already published"

  github_release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
