name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build & Test (${{ matrix.os }} - ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache Cargo Dependencies
        uses: swatinem/rust-cache@v2

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tooling
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli,wasm-pack

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Run Tests
        run: cargo test --workspace --all-features

      - name: Build WASM (only on Linux/macOS)
        if: runner.os != 'Windows'
        run: wasm-pack build crates/hadrone-wasm --target web || true

      - name: Dioxus Check
        run: |
          dx check -p web --platform web || true
          dx check -p desktop --platform desktop || true
          dx check -p dioxus-dashboard --platform desktop || true

      - name: Verify Examples
        run: cargo check --examples --all-features
